info:
  name: Neuer Cafe mit bereits existierender Email
  type: http
  seq: 2

http:
  method: POST
  url: "{{restUrl}}/cafe"
  headers:
    - name: "Content-Type"
      value: "application/json"
  body:
    type: json
    data: |-
      {
          "name": "TestCafe",
          "email": "admin@cafe.com",
          "kategorie": 3,
          "gruendungsdatum": "2026-04-09",
          "kaffeesorten": ["ESPRESSO", "CAPPUCCINO"],
          "username": "testcafe"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.body.detail
      operator: contains
      value: Email

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
