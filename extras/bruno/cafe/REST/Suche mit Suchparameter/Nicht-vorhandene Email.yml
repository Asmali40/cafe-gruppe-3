info:
  name: Nicht-vorhandene Cafe-Email
  type: http
  seq: 6

http:
  method: GET
  url: "{{restUrl}}?email=nichtvorhanden@cafe.de"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: email
      value: nichtvorhanden@cafe.de
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
