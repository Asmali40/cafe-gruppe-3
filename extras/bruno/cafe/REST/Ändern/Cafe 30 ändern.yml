info:
  name: Cafe 30 ändern
  type: http
  seq: 1

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "CafeItalia",
          "email": "cafeitalia@acme.de.put",
          "kategorie": 8,
          "gruendungsdatum": "2025-03-16",
          "username": "cafeitalia"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
