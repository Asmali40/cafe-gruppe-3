info:
  name: Nicht-vorhandenes Cafe 999999 ändern
  type: http
  seq: 5

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "999999"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "CafeUpdate",
          "email": "update@cafe.de",
          "kategorie": 5,
          "gruendungsdatum": "2025-01-15",
          "username": "cafeupdate"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
