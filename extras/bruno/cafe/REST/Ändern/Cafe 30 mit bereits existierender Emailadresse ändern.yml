info:
  name: Cafe 30 mit bereits existierender Emailadresse ändern
  type: http
  seq: 7

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"1"'
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "CafeNeu",
          "email": "admin@cafe.com",
          "kategorie": 8,
          "gruendungsdatum": "2025-03-16",
          "username": "cafeneu"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.body.detail
      operator: contains
      value: Email

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
