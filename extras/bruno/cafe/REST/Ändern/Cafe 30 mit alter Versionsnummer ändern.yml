info:
  name: Cafe 30 mit alter Versionsnummer ändern
  type: http
  seq: 2

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"-1"'
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "CafeBarbarossa",
          "email": "CafeBarbaraossa@acme.de.put",
          "kategorie": 8,
          "gruendungsdatum": "2025-03-16",
          "username": "cafebarbarossa"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "412"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
