info:
  name: Suche id, version, name von Cafes mit der Emailadresse
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($email: String = "cafeberlin@cafe.de") {
        cafes(suchparameter: {email: $email}) {
          id
          version
          name
          kategorie
          gruendungsdatum
          kaffeesorten
          username
          cafeManager {
            vorname
            nachname
          }
          produkte {
            name
            preis
            waehrung
          }
        }
      }
    variables: |-
      {
        "email": "cafeberlin@cafe.de"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.cafes
      operator: isArray
    - expression: res.body.data.cafes
      operator: length
      value: "1"
    - expression: res.body.data.cafes[0]
      operator: isJson
    - expression: res.body.data.cafes[0].id
      operator: gte
      value: "0"
    - expression: res.body.data.cafes[0].version
      operator: gte
      value: "0"
    - expression: res.body.data.cafes[0].name
      operator: isString
    - expression: res.body.data.cafes[0].name
      operator: isNotEmpty
    - expression: res.body.data.cafes[0].kategorie
      operator: gte
      value: "0"
    - expression: res.body.data.cafes[0].gruendungsdatum
      operator: isString
    - expression: res.body.data.cafes[0].kaffeesorten
      operator: isArray
    - expression: res.body.data.cafes[0].username
      operator: isString
    - expression: res.body.data.cafes[0].username
      operator: isNotEmpty
    - expression: res.body.data.cafes[0].cafeManager
      operator: isJson
    - expression: res.body.data.cafes[0].produkte
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
