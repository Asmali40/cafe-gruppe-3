info:
  name: Suche id, version, ... von Cafés mit Namen
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($name: String = "CafeBerlin") {
        cafes(suchparameter: {name: $name}) {
          id
          version
          email
          kategorie
          gruendungsdatum
          kaffeesorten
          username
        }
      }
    variables: |-
      {
        "name": "CafeBerlin"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body mit den Properties', () => {
          res.getBody()
            .data
            .cafes
            .forEach(cafe => {
              const { id, version, email, kategorie, gruendungsdatum, kaffeesorten, username } = cafe;
              expect(id).to.be.gte(0);
              expect(version).to.be.gte(0);
              expect(email).to.be.a('string');
              expect(kategorie).to.be.gte(0);
              expect(gruendungsdatum).to.be.a('string');
              expect(kaffeesorten).to.be.an('array');
              expect(username).to.be.a('string');
            });
        });

  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.cafes
      operator: isArray
    - expression: res.body.data.cafes
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
