info:
  name: Suche name, email, ... vom Cafe mit ID 20
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($cafeId: ID! = "20") {
        cafe(cafeId: $cafeId) {
          id
          version
          name
          email
          kategorie
          gruendungsdatum
          kaffeesorten
          username
        }
      }
    variables: |-
      {
        "cafeId": "20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.cafe
      operator: isJson
    - expression: res.body.data.cafe.version
      operator: gte
      value: "0"
    - expression: res.body.data.cafe.name
      operator: isString
    - expression: res.body.data.cafe.name
      operator: isNotEmpty
    - expression: res.body.data.cafe.email
      operator: isString
    - expression: res.body.data.cafe.email
      operator: isNotEmpty
    - expression: res.body.data.cafe.kategorie
      operator: gt
      value: "0"
    - expression: res.body.data.cafe.gruendungsdatum
      operator: isString
    - expression: res.body.data.cafe.kaffeesorten
      operator: isArray
    - expression: res.body.data.cafe.username
      operator: isString
    - expression: res.body.data.cafe.username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
